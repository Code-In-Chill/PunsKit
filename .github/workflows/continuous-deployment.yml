name: Continuous Deployment

on:
  push:
    branches:
      - master

jobs:
  ci-cd:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and Test
        run: ./gradlew build

      - name: Determine Version Bump
        id: version_bump
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          BUMP="patch"
          if [[ "$COMMIT_MSG" == *"major"* ]]; then
            BUMP="major"
          elif [[ "$COMMIT_MSG" == *"minor"* ]]; then
            BUMP="minor"
          fi
          echo "bump=$BUMP" >> $GITHUB_OUTPUT
          echo "Detected bump type: $BUMP"

      - name: Get Latest Tag
        id: get_tag
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT

      - name: Calculate New Version
        id: new_version
        run: |
          TAG="${{ steps.get_tag.outputs.latest_tag }}"
          VERSION=${TAG#v}
          IFS='.' read -r major minor patch <<< "$VERSION"
          
          BUMP="${{ steps.version_bump.outputs.bump }}"
          
          if [[ "$BUMP" == "major" ]]; then
            major=$((major + 1))
            minor=0
            patch=0
          elif [[ "$BUMP" == "minor" ]]; then
            minor=$((minor + 1))
            patch=0
          else
            patch=$((patch + 1))
          fi
          
          NEW_TAG="v$major.$minor.$patch"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "New Version: $NEW_TAG"

      - name: Create Release and Tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.new_version.outputs.new_tag }}
          git push origin ${{ steps.new_version.outputs.new_tag }}
          
          gh release create ${{ steps.new_version.outputs.new_tag }} \
            --title "Release ${{ steps.new_version.outputs.new_tag }}" \
            --generate-notes

      - name: Publish Package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Note: Cần cấu hình publishing trong build.gradle.kts để đẩy lên GitHub Packages
          ./gradlew publish -Pversion=${{ steps.new_version.outputs.new_tag }}
